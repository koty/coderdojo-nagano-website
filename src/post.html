<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- %POST_TITLE% --> - CoderDojo長野</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f8f5;
            --text-color: #2f3e46;
            --primary-color: #2d6a4f;
            --primary-hover: #1b4332;
            --accent-color: #52b788;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 10px rgba(45, 106, 79, 0.06);
            --card-shadow-hover: 0 12px 20px rgba(45, 106, 79, 0.1);
        }

        body {
            font-family: "Noto Sans JP", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            line-height: 1.8;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #e8f5e9, #d0e8d3);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
        }

        .header-logo {
            max-width: 120px;
            height: auto;
            border-radius: 12px;
        }

        .league-gothic-regular {
            font-family: "League Gothic", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings: "wdth" 100;
            font-size: 3.5rem;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
            text-align: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-top: 40px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2 {
            color: var(--primary-color);
            font-size: 1.4rem;
            margin-top: 30px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0ede2;
            padding-bottom: 8px;
        }

        p {
            margin-top: 0;
            margin-bottom: 15px;
        }

        .post-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            margin: 30px 0;
            box-shadow: var(--card-shadow);
        }

        /* リンクとボタン */
        a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed var(--primary-color);
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        a:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: #ffffff !important;
            padding: 12px 32px;
            border-radius: 30px;
            font-weight: bold;
            border-bottom: none;
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(45, 106, 79, 0.15);
        }

        .btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(45, 106, 79, 0.2);
        }

        .back-home {
            margin-top: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="../" style="border: none; display: flex; align-items: center; gap: 20px;">
            <img src="../logo.jpg" alt="CoderDojo長野のロゴ" class="header-logo">
            <div class="league-gothic-regular">CoderDojo Nagano</div>
        </a>
    </div>

    <article class="post-container">
        <!-- %POST_CONTENT% -->
    </article>

    <div class="back-home">
        <a href="../" class="btn">トップページに戻る</a>
    </div>

</body>
</html>
